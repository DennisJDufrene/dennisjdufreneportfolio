openapi: 3.0.3

info:
  title: DocPlatform API
  description: |
    The **DocPlatform API** provides programmatic access to a documentation management platform.
    Use it to create and manage documents, organize content into collections, retrieve versioned
    content, and manage contributors.

    ## Authentication

    All endpoints require a Bearer token passed in the `Authorization` header.

    ```
    Authorization: Bearer <your_token>
    ```

    Tokens are issued per user and scoped to specific permissions. See the
    [authentication guide](#section/Authentication) for details.

    ## Base URL

    ```
    https://api.docplatform.io/v1
    ```

    ## Rate Limiting

    Requests are limited to **1,000 per hour** per API token. Rate limit status is returned
    in every response header:

    | Header | Description |
    |---|---|
    | `X-RateLimit-Limit` | Maximum requests allowed per hour |
    | `X-RateLimit-Remaining` | Requests remaining in the current window |
    | `X-RateLimit-Reset` | Unix timestamp when the window resets |

    ## Versioning

    This is **v1** of the API. Breaking changes will be introduced only in new major versions.
    Deprecation notices are communicated via the `Deprecation` and `Sunset` response headers.

    ## Changelog

    | Version | Date | Notes |
    |---|---|---|
    | 1.2.0 | 2026-03-01 | Added `GET /collections/{id}/export` endpoint |
    | 1.1.0 | 2026-01-15 | Added contributor role filtering on `GET /contributors` |
    | 1.0.0 | 2025-11-01 | Initial release |

  version: 1.2.0
  contact:
    name: DocPlatform API Support
    email: api-support@docplatform.io
    url: https://docs.docplatform.io
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.docplatform.io/v1
    description: Production
  - url: https://sandbox.api.docplatform.io/v1
    description: Sandbox (no live data)

tags:
  - name: Documents
    description: Create, retrieve, update, and delete documentation articles.
  - name: Collections
    description: Group documents into versioned, publishable collections.
  - name: Contributors
    description: Manage users who can author and review content.
  - name: Search
    description: Full-text search across documents and collections.

security:
  - BearerAuth: []

paths:

  # ── Documents ──────────────────────────────────────────────────────────────

  /documents:
    get:
      summary: List documents
      description: |
        Returns a paginated list of documents the authenticated user has access to.
        Use the `status` and `collection_id` query parameters to narrow results.
      operationId: listDocuments
      tags: [Documents]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: status
          in: query
          description: Filter by document publish status.
          schema:
            type: string
            enum: [draft, review, published, archived]
          example: published
        - name: collection_id
          in: query
          description: Filter documents belonging to a specific collection.
          schema:
            type: string
            format: uuid
          example: "b3d2e1f0-4c5a-11ee-be56-0242ac120002"
      responses:
        '200':
          description: A paginated list of documents.
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/DocumentSummary'
              example:
                page: 1
                per_page: 20
                total: 84
                data:
                  - id: "a1b2c3d4-0000-11ee-be56-0242ac120002"
                    title: "Getting Started with the API"
                    slug: "getting-started"
                    status: "published"
                    collection_id: "b3d2e1f0-4c5a-11ee-be56-0242ac120002"
                    updated_at: "2026-02-14T10:30:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

    post:
      summary: Create a document
      description: Creates a new document in draft status. Assign it to a collection via `collection_id`.
      operationId: createDocument
      tags: [Documents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentCreate'
            example:
              title: "Authentication Guide"
              slug: "authentication-guide"
              body: "# Authentication\n\nAll requests require a Bearer token..."
              collection_id: "b3d2e1f0-4c5a-11ee-be56-0242ac120002"
              tags: ["auth", "security"]
      responses:
        '201':
          description: Document created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /documents/{document_id}:
    parameters:
      - $ref: '#/components/parameters/DocumentId'

    get:
      summary: Get a document
      description: Returns the full content and metadata for a single document by its ID.
      operationId: getDocument
      tags: [Documents]
      responses:
        '200':
          description: The requested document.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
              example:
                id: "a1b2c3d4-0000-11ee-be56-0242ac120002"
                title: "Getting Started with the API"
                slug: "getting-started"
                body: "# Getting Started\n\nWelcome to the DocPlatform API..."
                status: "published"
                collection_id: "b3d2e1f0-4c5a-11ee-be56-0242ac120002"
                tags: ["onboarding", "quickstart"]
                version: 3
                created_by: "u-9988776655"
                created_at: "2025-11-15T08:00:00Z"
                updated_at: "2026-02-14T10:30:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      summary: Update a document
      description: |
        Partially updates a document. Only fields included in the request body are modified.
        Updating `body` or `title` increments the document `version`.
      operationId: updateDocument
      tags: [Documents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentUpdate'
            example:
              title: "Getting Started with the DocPlatform API"
              status: "review"
      responses:
        '200':
          description: Updated document.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

    delete:
      summary: Delete a document
      description: Permanently deletes a document. This action cannot be undone.
      operationId: deleteDocument
      tags: [Documents]
      responses:
        '204':
          description: Document deleted. No content returned.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Collections ────────────────────────────────────────────────────────────

  /collections:
    get:
      summary: List collections
      description: Returns all collections the authenticated user has access to.
      operationId: listCollections
      tags: [Collections]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: A paginated list of collections.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Collection'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      summary: Create a collection
      description: Creates a new collection to group related documents.
      operationId: createCollection
      tags: [Collections]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectionCreate'
            example:
              name: "API Reference"
              description: "Full reference documentation for all API endpoints."
              version_label: "v1"
      responses:
        '201':
          description: Collection created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /collections/{collection_id}/export:
    parameters:
      - $ref: '#/components/parameters/CollectionId'
    get:
      summary: Export a collection
      description: |
        Exports all published documents in a collection as a single file.
        Supports Markdown (`.md`), JSON, and PDF formats via the `format` query parameter.
      operationId: exportCollection
      tags: [Collections]
      parameters:
        - name: format
          in: query
          required: true
          description: Output file format.
          schema:
            type: string
            enum: [markdown, json, pdf]
          example: markdown
      responses:
        '200':
          description: Exported collection file.
          content:
            text/markdown:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                type: object
            application/pdf:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Contributors ───────────────────────────────────────────────────────────

  /contributors:
    get:
      summary: List contributors
      description: Returns all contributors on the account. Filter by `role` to narrow results.
      operationId: listContributors
      tags: [Contributors]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: role
          in: query
          description: Filter by contributor role.
          schema:
            type: string
            enum: [admin, author, reviewer, viewer]
          example: author
      responses:
        '200':
          description: A paginated list of contributors.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Contributor'
              example:
                page: 1
                per_page: 20
                total: 5
                data:
                  - id: "u-9988776655"
                    name: "Dennis Dufrene"
                    email: "dennis@example.com"
                    role: "admin"
                    joined_at: "2025-11-01T00:00:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'

  /contributors/{contributor_id}:
    parameters:
      - $ref: '#/components/parameters/ContributorId'
    get:
      summary: Get a contributor
      description: Returns profile and role information for a single contributor.
      operationId: getContributor
      tags: [Contributors]
      responses:
        '200':
          description: The requested contributor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contributor'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Search ─────────────────────────────────────────────────────────────────

  /search:
    get:
      summary: Search documents
      description: |
        Full-text search across all documents and collections the authenticated user
        can access. Returns ranked results with matched excerpts.
      operationId: searchDocuments
      tags: [Search]
      parameters:
        - name: q
          in: query
          required: true
          description: The search query string.
          schema:
            type: string
            minLength: 2
          example: "authentication bearer token"
        - name: scope
          in: query
          description: Limit search to a specific resource type.
          schema:
            type: string
            enum: [documents, collections, all]
            default: all
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Search results with matched excerpts.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      query:
                        type: string
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/SearchResult'
              example:
                query: "authentication bearer token"
                page: 1
                per_page: 20
                total: 3
                data:
                  - resource_type: "document"
                    resource_id: "a1b2c3d4-0000-11ee-be56-0242ac120002"
                    title: "Authentication Guide"
                    excerpt: "...all requests require a **Bearer token** passed in the Authorization header..."
                    score: 0.97
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

# ── Components ────────────────────────────────────────────────────────────────

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Pass your API token in the `Authorization` header as `Bearer <token>`.

  parameters:
    DocumentId:
      name: document_id
      in: path
      required: true
      description: The unique ID of the document.
      schema:
        type: string
        format: uuid
      example: "a1b2c3d4-0000-11ee-be56-0242ac120002"

    CollectionId:
      name: collection_id
      in: path
      required: true
      description: The unique ID of the collection.
      schema:
        type: string
        format: uuid
      example: "b3d2e1f0-4c5a-11ee-be56-0242ac120002"

    ContributorId:
      name: contributor_id
      in: path
      required: true
      description: The unique ID of the contributor.
      schema:
        type: string
      example: "u-9988776655"

    PageParam:
      name: page
      in: query
      description: Page number (1-based).
      schema:
        type: integer
        minimum: 1
        default: 1

    PerPageParam:
      name: per_page
      in: query
      description: Number of results per page (max 100).
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  headers:
    X-RateLimit-Limit:
      description: Maximum requests allowed per hour.
      schema:
        type: integer
      example: 1000
    X-RateLimit-Remaining:
      description: Requests remaining in the current window.
      schema:
        type: integer
      example: 987

  schemas:

    Document:
      type: object
      description: A full documentation article including body content and metadata.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        title:
          type: string
          maxLength: 255
        slug:
          type: string
          description: URL-safe identifier. Must be unique within a collection.
          pattern: '^[a-z0-9-]+$'
        body:
          type: string
          description: Document content in Markdown.
        status:
          type: string
          enum: [draft, review, published, archived]
        collection_id:
          type: string
          format: uuid
          nullable: true
        tags:
          type: array
          items:
            type: string
        version:
          type: integer
          readOnly: true
          description: Increments on every content-modifying update.
        created_by:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required: [id, title, slug, body, status, version, created_by, created_at, updated_at]

    DocumentSummary:
      type: object
      description: Lightweight document representation used in list responses.
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        slug:
          type: string
        status:
          type: string
          enum: [draft, review, published, archived]
        collection_id:
          type: string
          format: uuid
          nullable: true
        updated_at:
          type: string
          format: date-time
      required: [id, title, slug, status, updated_at]

    DocumentCreate:
      type: object
      properties:
        title:
          type: string
          maxLength: 255
        slug:
          type: string
          pattern: '^[a-z0-9-]+$'
        body:
          type: string
          description: Document content in Markdown.
        collection_id:
          type: string
          format: uuid
          nullable: true
        tags:
          type: array
          items:
            type: string
          default: []
      required: [title, slug, body]

    DocumentUpdate:
      type: object
      description: All fields are optional. Only provided fields are updated.
      properties:
        title:
          type: string
          maxLength: 255
        slug:
          type: string
          pattern: '^[a-z0-9-]+$'
        body:
          type: string
        status:
          type: string
          enum: [draft, review, published, archived]
        collection_id:
          type: string
          format: uuid
          nullable: true
        tags:
          type: array
          items:
            type: string

    Collection:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
        description:
          type: string
          nullable: true
        version_label:
          type: string
          description: Human-readable version identifier (e.g., "v1", "2024-Q4").
          example: "v1"
        document_count:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required: [id, name, version_label, document_count, created_at, updated_at]

    CollectionCreate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        version_label:
          type: string
          example: "v1"
      required: [name, version_label]

    Contributor:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, author, reviewer, viewer]
        joined_at:
          type: string
          format: date-time
          readOnly: true
      required: [id, name, email, role, joined_at]

    SearchResult:
      type: object
      properties:
        resource_type:
          type: string
          enum: [document, collection]
        resource_id:
          type: string
          format: uuid
        title:
          type: string
        excerpt:
          type: string
          description: Matched passage with query terms highlighted in Markdown bold.
        score:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Relevance score from 0.0 (low) to 1.0 (high).
      required: [resource_type, resource_id, title, excerpt, score]

    PaginatedResponse:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
      required: [page, per_page, total]

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Machine-readable error code.
              example: "DOCUMENT_NOT_FOUND"
            message:
              type: string
              description: Human-readable description of the error.
              example: "No document found with the provided ID."
            details:
              type: array
              description: Field-level validation errors, when applicable.
              items:
                type: object
                properties:
                  field:
                    type: string
                  issue:
                    type: string
      required: [error]

  responses:
    BadRequest:
      description: The request was malformed or missing required fields.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: "BAD_REQUEST"
              message: "The request body is missing required fields."
              details:
                - field: "title"
                  issue: "This field is required."

    Unauthorized:
      description: Missing or invalid authentication token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: "UNAUTHORIZED"
              message: "A valid Bearer token is required."

    NotFound:
      description: The requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: "NOT_FOUND"
              message: "No resource found with the provided ID."

    UnprocessableEntity:
      description: The request was well-formed but failed validation rules.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: "VALIDATION_ERROR"
              message: "One or more fields failed validation."
              details:
                - field: "slug"
                  issue: "Must contain only lowercase letters, numbers, and hyphens."

    RateLimitExceeded:
      description: The rate limit for this token has been exceeded.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: "RATE_LIMIT_EXCEEDED"
              message: "You have exceeded 1,000 requests per hour. Try again after the reset window."
